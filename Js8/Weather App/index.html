<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sky: #0a0f1e;
            --card: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.10);
            --accent: #4fc3f7;
            --accent2: #81d4fa;
            --text: #e8f4fd;
            --muted: rgba(232,244,253,0.50);
        }

        body {
            min-height: 100vh;
            background: var(--sky);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        /* animated star background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 72% 8%,  rgba(255,255,255,.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 40% 55%, rgba(255,255,255,.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 88% 42%, rgba(255,255,255,.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 5%  80%, rgba(255,255,255,.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,.4) 0%, transparent 100%),
                radial-gradient(2px 2px at 30% 5%,  rgba(79,195,247,.8) 0%, transparent 100%),
                radial-gradient(2px 2px at 95% 70%, rgba(79,195,247,.6) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* ── Header ── */
        .app-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.8rem, 10vw, 4rem);
            letter-spacing: 0.08em;
            line-height: 1;
            color: var(--accent);
            text-shadow: 0 0 40px rgba(79,195,247,.4);
        }
        .app-title span { color: var(--text); }

        /* ── Search bar ── */
        .search-bar {
            display: flex;
            gap: .6rem;
        }
        .search-bar input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: .75rem 1.1rem;
            font-family: inherit;
            font-size: .95rem;
            color: var(--text);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            backdrop-filter: blur(8px);
        }
        .search-bar input::placeholder { color: var(--muted); }
        .search-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79,195,247,.15);
        }
        .search-bar button {
            background: var(--accent);
            color: #0a0f1e;
            border: none;
            border-radius: 12px;
            padding: .75rem 1.4rem;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.05rem;
            letter-spacing: .06em;
            cursor: pointer;
            transition: background .2s, transform .1s, box-shadow .2s;
        }
        .search-bar button:hover {
            background: var(--accent2);
            box-shadow: 0 4px 20px rgba(79,195,247,.35);
        }
        .search-bar button:active { transform: scale(.96); }

        /* ── List / card ── */
        .list { min-height: 60px; }

        .weather-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem 1.8rem;
            backdrop-filter: blur(16px);
            animation: fadeUp .45s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .city-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: .06em;
            line-height: 1.1;
            color: var(--text);
        }
        .country-badge {
            font-size: .72rem;
            font-weight: 500;
            letter-spacing: .12em;
            color: var(--accent);
            background: rgba(79,195,247,.12);
            border: 1px solid rgba(79,195,247,.25);
            border-radius: 6px;
            padding: .2rem .55rem;
            margin-top: .35rem;
            display: inline-block;
        }
        .weather-icon {
            width: 72px;
            height: 72px;
            filter: drop-shadow(0 0 12px rgba(79,195,247,.5));
        }

        .temp-row {
            display: flex;
            align-items: flex-end;
            gap: .4rem;
            margin-bottom: .3rem;
        }
        .temp-main {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 5rem;
            line-height: 1;
            color: var(--text);
        }
        .temp-unit {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: var(--accent);
            padding-bottom: .6rem;
        }

        .description {
            font-size: .9rem;
            color: var(--muted);
            text-transform: capitalize;
            margin-bottom: 1.5rem;
            letter-spacing: .03em;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 1.4rem;
        }

        .details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: .8rem;
            text-align: center;
        }
        .detail-item {
            display: flex;
            flex-direction: column;
            gap: .3rem;
        }
        .detail-icon { font-size: 1.3rem; }
        .detail-label {
            font-size: .65rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .detail-value {
            font-size: .95rem;
            font-weight: 500;
            color: var(--text);
        }

        /* ── Error ── */
        .error-msg {
            background: rgba(255,80,80,.08);
            border: 1px solid rgba(255,80,80,.25);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            font-size: .88rem;
            color: #ff8a80;
            text-align: center;
            animation: fadeUp .3s ease both;
        }

        /* ── Loader ── */
        .loader {
            display: flex;
            justify-content: center;
            padding: 2rem 0;
            gap: .4rem;
        }
        .loader span {
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce .7s ease infinite;
        }
        .loader span:nth-child(2) { animation-delay: .12s; }
        .loader span:nth-child(3) { animation-delay: .24s; }
        @keyframes bounce {
            0%,100% { transform: translateY(0); opacity:.5; }
            50%      { transform: translateY(-10px); opacity:1; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div>
            <div class="app-title">Sky<span>Cast</span></div>
        </div>

        <div class="search-bar">
            <input type="text" placeholder="Search city…" />
            <button>Search</button>
        </div>

        <div class="list"></div>
    </div>

    <script>
        let input = document.querySelector("input");
        let btn   = document.querySelector("button");
        let list  = document.querySelector(".list");
        let apiK  = "9f6290d6cda9a36a63755fadee71f83d";
        let city  = "bhopal";

        btn.addEventListener("click", () => {
            city = input.value.trim() || city;
            list.innerHTML = `<div class="loader"><span></span><span></span><span></span></div>`;

            fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiK}`)
                .then(res => res.json())
                .then(val => {
                    if (val.cod !== 200) throw new Error(val.message);
                    show(val);
                })
                .catch(err => {
                    list.innerHTML = `<div class="error-msg">⚠️ ${err.message || "City not found. Please try again."}</div>`;
                });
        });

        // press Enter to search
        input.addEventListener("keydown", e => { if (e.key === "Enter") btn.click(); });

        function show(val) {
            let tempC      = (val.main.temp - 273.15).toFixed(1);
            let feelsLike  = (val.main.feels_like - 273.15).toFixed(1);
            let humidity   = val.main.humidity;
            let windSpeed  = val.wind.speed;
            let desc       = val.weather[0].description;
            let cityName   = val.name;
            let country    = val.sys.country;
            let icon       = val.weather[0].icon;

            list.innerHTML = `
                <div class="weather-card">
                    <div class="card-top">
                        <div>
                            <div class="city-name">${cityName}</div>
                            <span class="country-badge">${country}</span>
                        </div>
                        <img class="weather-icon"
                             src="https://openweathermap.org/img/wn/${icon}@2x.png"
                             alt="${desc}" />
                    </div>

                    <div class="temp-row">
                        <div class="temp-main">${tempC}</div>
                        <div class="temp-unit">°C</div>
                    </div>
                    <div class="description">${desc}</div>

                    <div class="divider"></div>

                    <div class="details">
                        <div class="detail-item">
                            <div class="detail-icon">🌡️</div>
                            <div class="detail-label">Feels Like</div>
                            <div class="detail-value">${feelsLike}°C</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-icon">💧</div>
                            <div class="detail-label">Humidity</div>
                            <div class="detail-value">${humidity}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-icon">🌬️</div>
                            <div class="detail-label">Wind</div>
                            <div class="detail-value">${windSpeed} m/s</div>
                        </div>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
