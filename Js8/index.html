<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search</title>
    <style>
        .list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            width: 100%;
            max-width: 1000px;
        }

        .list img {
            width: 100%;
            height: 300px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <input type="text">
    <button>Search</button>
    <div class="list">

    </div>
    <script src="index.js"></script>
</body>

</html>
