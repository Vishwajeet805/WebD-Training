<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Location Tracker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #333333;
            font-size: 24px;
            margin-bottom: 20px;
        }

        button {
            background: #667eea;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #5a6fd6;
        }

        button:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }

        .data-field {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #edf2f7;
            font-size: 15px;
            color: #4a5568;
        }

        .data-field:last-child {
            border-bottom: none;
        }

        .label {
            font-weight: 600;
            color: #718096;
        }

        .value {
            font-weight: 500;
            color: #2d3748;
            text-align: right;
            max-width: 60%;
            word-wrap: break-word;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Live Location Tracker</h1>
        <button id="track-btn" onclick="getLocation()">Locate Me</button>

        <div class="data-field">
            <span class="label">Area:</span>
            <span class="value" id="area">-</span>
        </div>
        <div class="data-field">
            <span class="label">City:</span>
            <span class="value" id="city">-</span>
        </div>
        <div class="data-field">
            <span class="label">State:</span>
            <span class="value" id="state">-</span>
        </div>
        <div class="data-field">
            <span class="label">Country:</span>
            <span class="value" id="country">-</span>
        </div>
        <div class="data-field">
            <span class="label">Pincode:</span>
            <span class="value" id="pincode">-</span>
        </div>
    </div>

    <script src="index.js">    </script>

</body>

</html>
