<!DOCTYPE html>
<html>

<head>
  <title>Countdown Timer</title>
  <!-- My Countdown Timer -->
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0f172a;
      color: white;
      font-family: Arial;
    }

    .timer {
      text-align: center;
      padding: 30px;
      border: 2px solid white;
      border-radius: 20px;
      box-shadow: 0 0 20px cyan;
    }

    h1 {
      margin-bottom: 20px;
    }

    #countdown {
      font-size: 45px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="timer">
    <h1>Countdown to 20 May 2026</h1>
    <div id="countdown"></div>
  </div>

  <script src="index.js"></script>

</body>

</html>
